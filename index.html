<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Oxygenchick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tagesschrift&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background-color: #000000;
      color: #ffffff;
      font-family: "Tagesschrift", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
    }

    .site {
      flex: 1 0 auto;
      width: min(550px, 100%);
      max-width: 100%;
      min-height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-left: max(16px, env(safe-area-inset-left, 0px));
      padding-right: max(16px, env(safe-area-inset-right, 0px));
      padding-bottom: max(12px, env(safe-area-inset-bottom, 0px));
      box-sizing: border-box;
    }

    .content {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: clamp(20px, 6dvh, 70px);
      min-height: 0;
      width: 100%;
      padding-top: max(clamp(20px, 5dvh, 44px), env(safe-area-inset-top, 0px));
    }

    .content-main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(4px, 1.8dvh, 28px);
      width: 100%;
      min-height: 0;
    }

    .logo {
      width: auto;
      max-width: min(200px, 55vw);
      max-height: min(200px, 22dvh);
      height: auto;
      display: block;
      object-fit: contain;
      flex-shrink: 1;
      min-height: 0;
    }

    .decor {
      width: auto;
      max-width: 65px;
      max-height: min(120px, 8dvh);
      height: auto;
      display: block;
      object-fit: contain;
      flex-shrink: 1;
      min-height: 0;
    }

    .intro {
      width: 320px;
      max-width: 100%;
      font-size: clamp(12px, 3.6dvh, 16px);
      line-height: 1.3;
      font-weight: 400;
      flex-shrink: 0;
    }

    .links {
      list-style: none;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(6px, 1.8dvh, 18px);
      margin-top: clamp(12px, 8.25dvh, 108px);
      font-size: clamp(13px, 3.2dvh, 19.2px);
      line-height: 1.15;
      flex-shrink: 0;
    }

    .links a {
      color: #ffffff;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .email {
      flex-shrink: 0;
      padding-top: clamp(8px, 2dvh, 24px);
      font-size: clamp(13px, 3.2dvh, 16px);
    }
  </style>
</head>
<body>
  <div class="site">
    <div class="content">
    <img class="logo" src="images/logo.png" width="200" alt="Logo">

    <div class="content-main">
    <img class="decor" src="images/decor.png" width="65" alt="" role="presentation">

    <p class="intro">
      Independent game developer and artist specializing in game graphics.<br>
      Currently creating Cauldron Inn.
    </p>

    <img class="decor" src="images/decor.png" width="65" alt="" role="presentation">

    <ul class="links">
      <li><a href="#">Cauldron Inn</a></li>
      <li><a href="#">Indie Toolbox</a></li>
      <li><a href="#">Buyan</a></li>
      <li><a href="#">Fab</a></li>
    </ul>
    </div>
    </div>

    <p class="email">i@pavelefremov.ru</p>
  </div>
</body>
</html>
